version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: aipm_postgres
    restart: always
    environment:
      POSTGRES_USER: aipm_admin
      POSTGRES_PASSWORD: aipm_secure_password123
      POSTGRES_DB: aipm_metadata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis_broker:
    image: redis:7-alpine
    container_name: aipm_redis
    restart: always
    ports:
      - "6379:6379"

  qdrant_vector:
    image: qdrant/qdrant:v1.9.1
    container_name: aipm_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: